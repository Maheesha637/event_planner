<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Vendor</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container" style="max-width: 520px; margin: 0 auto; padding-top: 40px;">
    <div class="page-header" style="text-align: center;">
        <h1>Edit Vendor Details</h1>
        <p style="color: #64748b; margin-bottom: 0;">Update vendor information</p>
    </div>

    <div class="card">
        <form th:action="@{'/events/' + ${eventId} + '/vendors/' + ${vendor.vendorID} + '/update'}" th:object="${vendor}" method="post" class="theme">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label for="name">Vendor Name</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>
                <div>
                    <label for="category">Category</label>
                    <input type="text" id="category" th:field="*{category}">
                </div>
            </div>

            <label for="description">Description</label>
            <input type="text" id="description" th:field="*{description}">

            <label for="contactDetails">Contact Details</label>
            <input type="text" id="contactDetails" th:field="*{contactDetails}" required>

            <label for="rating">Rating (0-5)</label>
            <input type="number" id="rating" th:field="*{rating}" min="0" max="5" step="0.1">

            <button type="submit" style="width: 100%; margin-top: 24px;">Update Vendor</button>
        </form>
        
        <div style="text-align: center; margin-top: 24px;">
            <a th:href="@{'/events/' + ${eventId} + '/vendors'}" class="action-btn" style="display: inline-flex; align-items: center; gap: 8px;">← Back to Vendors</a>
        </div>
    </div>
</div>
</body>
</html>
