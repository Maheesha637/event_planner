<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Create Contract</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container" style="max-width: 520px; margin: 0 auto; padding-top: 40px;">
    <div class="page-header" style="text-align: center;">
        <h1>Create Contract</h1>
        <p style="color: #64748b; margin-bottom: 0;">Set up a new vendor contract</p>
    </div>

    <div class="card">
        <form th:action="@{'/events/' + ${eventId} + '/vendors/' + ${vendorId} + '/contract/create'}" th:object="${contract}" method="post" class="theme">
            <label for="attribute">Contract Name</label>
            <input type="text" id="attribute" th:field="*{attribute}" required>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label for="paymentAmount">Payment Amount ($)</label>
                    <input type="number" id="paymentAmount" th:field="*{paymentAmount}" step="0.01" required>
                </div>
                <div>
                    <label for="paymentStatus">Payment Status</label>
                    <select id="paymentStatus" th:field="*{paymentStatus}" required>
                        <option value="">Select Payment Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Paid">Paid</option>
                        <option value="Partial">Partial</option>
                        <option value="Overdue">Overdue</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <button type="submit" style="width: 100%; margin-top: 24px;">Create Contract</button>
        </form>
        
        <div style="text-align: center; margin-top: 24px;">
            <a th:href="@{'/events/' + ${eventId} + '/vendors'}" class="action-btn" style="display: inline-flex; align-items: center; gap: 8px;">← Back to Vendors</a>
        </div>
    </div>
</div>
</body>
</html>
